<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Inventory Pro - Gestionnaire de Stock Gaming</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>🎮 PIXEL INVENTORY MANAGER PRO</h1>
        <nav>
            <ul>
                <li><a href="#inventory-list">Inventaire</a></li>
                <li><a href="#add-product-section">Ajouter (Admin)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Section Statistiques -->
        <section class="panel stats-panel" id="stats-panel">
            <div class="stat-card">
                <h3>📦 Produits distincts</h3>
                <div class="stat-value" id="stat-products">0</div>
            </div>
            <div class="stat-card">
                <h3>🎮 Stock total unités</h3>
                <div class="stat-value" id="stat-total-stock">0</div>
            </div>
            <div class="stat-card">
                <h3>💰 Valeur totale (€)</h3>
                <div class="stat-value" id="stat-total-value">0.00 €</div>
            </div>
        </section>

        <!-- Filtres et actions -->
        <section id="controls" class="panel filter-panel">
            <div class="filter-group">
                <label>🔍 Recherche</label>
                <input type="text" id="search-bar" placeholder="Nom du produit...">
            </div>
            <div class="filter-group">
                <label>📁 Catégorie</label>
                <select id="filter-type">
                    <option value="all">Toutes</option>
                    <option value="jeu">Jeux Vidéo</option>
                    <option value="console">Consoles</option>
                    <option value="accessoire">Accessoires</option>
                </select>
            </div>
            <div class="filter-group">
                <label>✨ État (Jeux)</label>
                <select id="filter-etat" class="hidden">
                    <option value="all">Tous</option>
                    <option value="Neuf">Neuf</option>
                    <option value="Occasion">Occasion</option>
                </select>
            </div>
            <div class="filter-group">
                <label>💰 Prix min</label>
                <input type="number" id="price-min" step="0.01" placeholder="0">
            </div>
            <div class="filter-group">
                <label>💰 Prix max</label>
                <input type="number" id="price-max" step="0.01" placeholder="9999">
            </div>
            <div class="filter-group">
                <label>📊 Trier par</label>
                <select id="sort-by">
                    <option value="none">Aucun tri</option>
                    <option value="price-asc">Prix croissant</option>
                    <option value="price-desc">Prix décroissant</option>
                    <option value="name-asc">Nom A→Z</option>
                    <option value="name-desc">Nom Z→A</option>
                    <option value="stock-asc">Stock croissant</option>
                    <option value="stock-desc">Stock décroissant</option>
                </select>
            </div>
            <div class="action-buttons">
                <button id="export-btn" class="btn-action">📤 Exporter JSON</button>
                <label for="import-file" class="btn-action" style="cursor:pointer;">📥 Importer JSON</label>
                <input type="file" id="import-file" accept=".json" style="display:none;">
            </div>
        </section>

        <section id="inventory-list">
            <h2>🎲 Inventaire en temps réel</h2>
            <div id="product-container"></div>
        </section>

        <!-- Formulaire d'ajout -->
        <section id="add-product-section" class="panel form-panel">
            <h2>🕹️ Enregistrement Produit</h2>
            <form id="add-product-form">
                <div class="form-group">
                    <label>Type d'entité *</label>
                    <select id="new-type" required>
                        <option value="jeu" selected>Jeu Vidéo</option>
                        <option value="console">Console</option>
                        <option value="accessoire">Accessoire</option>
                    </select>
                </div>
                
                <div class="form-group ai-assist">
                    <label>Nom du produit * <span id="ai-badge" class="ai-badge">✨ Auto-fill IA (Jeux uniquement)</span></label>
                    <input type="text" id="new-nom" placeholder="Saisis le nom puis clique ailleurs..." required>
                </div>

                <div class="form-group-row">
                    <div class="form-group">
                        <label>Prix unitaire (€) *</label>
                        <input type="number" id="new-prix" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Stock initial *</label>
                        <input type="number" id="new-quantite" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>URL de l'image (Optionnel)</label>
                    <input type="text" id="new-image" placeholder="https://...">
                </div>

                <div id="fields-jeu" class="dynamic-fields">
                    <div class="form-group-row">
                        <div class="form-group">
                            <label>Plateforme de jeu *</label>
                            <input type="text" id="new-plateforme-jeu" placeholder="PS5, Switch, PC...">
                        </div>
                        <div class="form-group">
                            <label>État *</label>
                            <select id="new-etat">
                                <option value="Neuf">Neuf</option>
                                <option value="Occasion">Occasion</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Genre *</label>
                        <select id="new-genre">
                            <option value="">-- Sélectionner --</option>
                            <option value="Action/Aventure">Action / Aventure</option>
                            <option value="RPG">RPG / Jeu de rôle</option>
                            <option value="FPS/TPS">FPS / TPS (Tir)</option>
                            <option value="Plateforme">Plateforme</option>
                            <option value="Combat">Combat</option>
                            <option value="Course">Course</option>
                            <option value="Sport">Sport</option>
                            <option value="Stratégie/Gestion">Stratégie / Gestion</option>
                            <option value="Simulation">Simulation</option>
                            <option value="Party Game">Party Game</option>
                        </select>
                    </div>
                </div>

                <div id="fields-console" class="dynamic-fields hidden">
                    <div class="form-group-row">
                        <div class="form-group">
                            <label>Constructeur *</label>
                            <select id="new-constructeur">
                                <option value="Sony">Sony</option>
                                <option value="Microsoft">Microsoft</option>
                                <option value="Nintendo">Nintendo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Modèle *</label>
                            <select id="new-modele">
                                <option value="Standard">Standard</option>
                                <option value="Slim">Slim</option>
                                <option value="Pro">Pro</option>
                                <option value="Series X">Series X</option>
                                <option value="Series S">Series S</option>
                                <option value="OLED">OLED</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label>Couleur *</label>
                            <input type="text" id="new-couleur-console" placeholder="ex: Blanc, Noir">
                        </div>
                        <div class="form-group">
                            <label>Manettes incluses *</label>
                            <input type="number" id="new-manettes" min="0" value="1">
                        </div>
                    </div>
                </div>

                <div id="fields-accessoire" class="dynamic-fields hidden">
                    <div class="form-group-row">
                        <div class="form-group">
                            <label>Type de périphérique *</label>
                            <select id="new-type-acc">
                                <option value="Manette">Manette</option>
                                <option value="Casque Gaming">Casque Gaming</option>
                                <option value="Clavier/Souris">Clavier/Souris</option>
                                <option value="Volant/Arcade">Volant/Arcade</option>
                                <option value="Câbles/Autres">Câbles/Autres</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Couleur *</label>
                            <input type="text" id="new-couleur-acc" placeholder="ex: Rouge, Noir">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">✅ Ajouter à l'inventaire</button>
            </form>
        </section>
    </main>

    <!-- Modal d'édition -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Modifier le produit</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="edit-nom" required>
                </div>
                <div class="form-group-row">
                    <div class="form-group">
                        <label>Prix (€)</label>
                        <input type="number" id="edit-prix" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Quantité</label>
                        <input type="number" id="edit-quantite" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="edit-image">
                </div>
                <div id="edit-dynamic-fields"></div>
                <button type="submit" class="btn-submit">💾 Sauvegarder</button>
            </form>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
